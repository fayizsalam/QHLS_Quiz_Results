<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QHLS Weekly Quiz Results</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1 {
    text-align: center;
    margin-bottom: 10px; /* Reduced margin to keep them closer together */
    color: #00897B;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-weight: 800; /* Extra bold for headings */
}

/* Specific styling for the QHLS heading */
h1:first-of-type {
    font-size: 48px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
}

/* Specific styling for the Results heading */
h1:nth-of-type(2) {
    font-size: 28px;
    margin-bottom: 25px;
}

.table-container{
    width:100%;
    overflow-x:auto;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
    width:100%;
    min-width:500px;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
    white-space:nowrap;
}

th{
    background:#00897B;
    color:#fff;
}

tr:nth-child(even){
    background:#f9f9f9;
}

tr:hover{
    background:#f1f1f1;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

   

    th,td{
        padding:10px;
        font-size:14px;
    }

}

@media(max-width:480px){


    th,td{
        padding:8px;
        font-size:13px;
    }

}
</style>

</head>

<body>

<h1>QHLS</h1>
<h1>🏆 Weekly Quiz Results</h1>

<div class="table-container">    
<table id="resultTable">
<thead>
<tr>
<th>Sl No</th>
<th>Name</th>
<th>Wing</th>
<th>Score</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>    


<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";

const tableBody = document.querySelector("#resultTable tbody");
tableBody.innerHTML = '<tr><td colspan="4">Loading results...</td></tr>';

fetch(csvURL)
  .then(res => res.text())
  .then(data => {
    // Split by newline and remove empty lines
    const rows = data.trim().split("\n");
    let html = "";

    // Skip the header row (i=1)
    for (let i = 1; i < rows.length; i++) {
      // Regex split to handle potential quotes around CSV fields
      const cols = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
      
      if (!cols || cols.length < 4) continue;

      html += `
        <tr>
          <td>${cols[0]}</td>
          <td>${cols[1]}</td>
          <td>${cols[2]}</td>
          <td>${cols[3]}</td>
        </tr>
      `;
    }
    tableBody.innerHTML = html;
  })
  .catch(err => {
    tableBody.innerHTML = '<tr><td colspan="4">Failed to load data.</td></tr>';
    console.error("Error fetching CSV:", err);
  });
</script>

</body>
</html>
