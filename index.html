<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QHLS Weekly Quiz Results</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    transition:.3s;
}

.container{
    max-width:1000px;
    margin:auto;
}    

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
}

th,td{
    padding:14px;
}

@media(max-width:768px){

body{
padding:10px;
}

table{
font-size:14px;
}

th,td{
padding:8px;
}

h1{
font-size:24px;
}

}
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<div class="container">
    
<h1>🏆 QHLS Weekly Quiz Results</h1>

  
<p id="updated"></p>
    
<table id="resultTable">
<thead>
<tr>
<th>Sl No.</th>
<th>Name</th>
<th>Wing</th>
<th>Score</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";

fetch(csvURL)
  .then(response => {
    console.log("Status:", response.status);
    return response.text();
  })
  .then(csv => {
    console.log(csv);

    const rows = csv.trim().split(/\r?\n/);

    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    rows.slice(1).forEach(row => {
      const cols = row.split(",");

      const tr = document.createElement("tr");

      cols.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col.replace(/"/g, "");
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  })
  .catch(error => {
    console.error("Fetch Error:", error);
  });

    window.onload=()=>{

confetti({

particleCount:150,

spread:90,

origin:{y:0.4}

});

}
</script>

</body>
</html>
