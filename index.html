<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QHLS Weekly Quiz Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <header class="py-12 px-4 text-center">
        <div class="max-w-2xl mx-auto">
            
            <!-- Logo Section -->
            <img src="https://github.com/fayizsalam/QHLS_Quiz_Results/blob/main/Wisdom%20youth.png?raw=true" 
                 onerror="this.style.display='none'" 
                 alt="Wisdom Youth Logo" 
                 class="mx-auto h-20 w-auto mb-6 opacity-90">
            
            <h1 class="text-5xl md:text-6xl font-extrabold text-teal-900 tracking-tight mb-2">QHLS</h1>
            <h2 class="text-xl md:text-2xl font-medium text-slate-600 mb-6">Weekly Quiz Results</h2>
            
            <div class="inline-flex items-center gap-3 px-6 py-3 bg-white border border-slate-200 shadow-sm rounded-2xl">
                <span class="text-xl">🎓</span>
                <span class="font-semibold text-slate-700">ക്ലാസ് - 2️⃣</span>
                <span class="text-slate-300">|</span>
                <span class="text-teal-700 font-bold">📖 സൂറത്തുല്‍ മുഅ്മിനൂന്‍</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-16">
        <div id="resultsGrid" class="grid grid-cols-1 gap-4">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-12 text-center">
                <div class="flex flex-col items-center justify-center gap-3">
                    <div class="w-8 h-8 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="font-medium text-slate-600">Loading results...</span>
                </div>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-slate-400 text-sm">
            © 2026 QHLS ചുങ്കം ശാഖ
        </footer>
    </main>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";
        const resultsGrid = document.querySelector("#resultsGrid");

        fetch(csvURL)
            .then(res => res.text())
            .then(data => {
                const rows = data.trim().split("\n");
                let html = "";

                for (let i = 1; i < rows.length; i++) {
                    const rowText = rows[i].trim();
                    if (!rowText) continue;

                    const cols = rowText.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 4) continue;

                    const slNo = cols[0].replace(/"/g, '');
                    const name = cols[1].replace(/"/g, '');
                    const wing = cols[2].replace(/"/g, '');
                    const score = cols[3].replace(/"/g, '');

                    // Generating individual result cards
                    html += `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 hover:shadow-md transition-shadow duration-300">
                            <div class="flex-shrink-0 w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold text-sm">
                                #${slNo}
                            </div>
                            <div class="flex-grow">
                                <h3 class="font-bold text-slate-900 text-lg">${name}</h3>
                                <p class="text-sm text-slate-500">${wing}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xs text-slate-400 uppercase tracking-widest block mb-1">Score</span>
                                <span class="text-2xl font-black text-teal-600">${score}</span>
                            </div>
                        </div>
                    `;
                }
                resultsGrid.innerHTML = html;
            })
            .catch(err => {
                resultsGrid.innerHTML = '<div class="bg-white rounded-3xl p-8 text-center text-red-400 shadow-sm border border-slate-100">Failed to load data. Please check connection.</div>';
                console.error("Error fetching CSV:", err);
            });
    </script>
</body>
</html>
