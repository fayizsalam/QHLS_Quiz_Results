<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QHLS Weekly Quiz Results</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#00897B;
    font-size:32px;
}

.table-container{
    width:100%;
    overflow-x:auto;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

table{
    width:100%;
    min-width:500px;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
    white-space:nowrap;
}

th{
    background:#00897B;
    color:#fff;
}

tr:nth-child(even){
    background:#f9f9f9;
}

tr:hover{
    background:#f1f1f1;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    h1{
        font-size:24px;
    }

    th,td{
        padding:10px;
        font-size:14px;
    }

}

@media(max-width:480px){

    h1{
        font-size:20px;
    }

    th,td{
        padding:8px;
        font-size:13px;
    }

}
</style>

</head>

<body>

<h1>🏆 QHLS Weekly Quiz Results</h1>

<div class="table-container">    
<table id="resultTable">
<thead>
<tr>
<th>Sl No</th>
<th>Name</th>
<th>Wing</th>
<th>Score</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>    

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n");

let html="";

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<4) continue;

html+=`
<tr>
<td>${cols[0]}</td>
<td>${cols[1]}</td>
<td>${cols[2]}</td>
<td>${cols[3]}</td>
</tr>
`;

}

document.querySelector("#resultTable tbody").innerHTML=html;

});

</script>

</body>
</html>
