<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QHLS Weekly Quiz Results</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
    color:#00897B;
    margin-bottom:25px;
}

.table-container{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
    background:#00897B;
    color:#fff;
}

th,td{
    padding:14px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#fafafa;
}

tr:hover{
    background:#f1f1f1;
}

@media(max-width:768px){

thead{
    display:none;
}

table,
tbody,
tr,
td{
    display:block;
    width:100%;
}

table{
    box-shadow:none;
    background:transparent;
}

tr{
    background:#fff;
    margin-bottom:18px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.12);
    overflow:hidden;
}

td{
    text-align:right;
    padding:15px;
    position:relative;
    border:none;
    border-bottom:1px solid #eee;
}

td:last-child{
    border-bottom:none;
}

td::before{
    content:attr(data-label);
    position:absolute;
    left:15px;
    font-weight:bold;
    color:#00897B;
}

}
</style>

</head>

<body>

<h1>🏆 QHLS Weekly Quiz Results</h1>

<div class="table-container">

<table id="resultTable">
    <thead>
        <tr>
            <th>Sl No</th>
            <th>Name</th>
            <th>Wing</th>
            <th>Score</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

</div>   

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";

fetch(csvURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n");

let html="";

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

if(cols.length<4) continue;

html += `
<tr>
    <td data-label="Sl No">${cols[0]}</td>
    <td data-label="Name">${cols[1]}</td>
    <td data-label="Wing">${cols[2]}</td>
    <td data-label="Score">${cols[3]}</td>
</tr>
`;

}

document.querySelector("#resultTable tbody").innerHTML=html;

});

</script>

</body>
</html>
