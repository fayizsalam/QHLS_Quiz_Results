<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QHLS Weekly Quiz Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .font-breath { 
            font-family: 'Great Vibes', cursive; 
        }
        
        .text-gold-shine {
            background: linear-gradient(to right, #C69320 0%, #F9F0B3 20%, #C69320 40%, #8E6516 60%, #F9F0B3 80%, #C69320 100%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0px 2px 4px rgba(198, 147, 32, 0.4));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-stone-50 to-orange-50 min-h-screen text-slate-900 overflow-x-hidden">

    <canvas id="bgCanvas"></canvas>

    <header class="py-12 px-4 text-center">
        <div class="max-w-2xl mx-auto">
            <img src="https://github.com/fayizsalam/QHLS_Quiz_Results/blob/main/Wisdom%20youth.png?raw=true" 
                 onerror="this.style.display='none'" 
                 alt="Wisdom Youth Logo" 
                 class="mx-auto h-20 w-auto mb-6 opacity-90 drop-shadow-md">
            
            <h1 class="text-5xl md:text-6xl font-extrabold text-stone-900 tracking-tight mb-2">QHLS</h1>
            <h2 class="text-xl md:text-2xl font-medium text-stone-600 mb-6">Weekly Quiz Results</h2>
            
            <div class="inline-flex items-center gap-3 px-6 py-3 bg-white/60 backdrop-blur-sm border border-stone-200 shadow-sm rounded-2xl">
                <span class="text-xl">🎓</span>
                <span class="font-semibold text-stone-700">ക്ലാസ് -</span>
                <span class="text-3xl font-bold text-amber-800">3</span>
                <span class="text-stone-300">|</span>
                <span class="text-amber-800 font-bold">📖 സൂറത്തുല്‍ മുഅ്മിനൂന്‍</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pb-16">
        
        <div class="text-center mb-5 mt-2">
            <h2 class="font-breath text-gold-shine text-6xl md:text-7xl pb-2">Winners</h2>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 gap-4">
            <div class="bg-white/60 backdrop-blur-sm rounded-3xl shadow-sm border border-stone-100 p-12 text-center">
                <div class="flex flex-col items-center justify-center gap-3">
                    <div class="w-8 h-8 border-4 border-amber-600 border-t-transparent rounded-full animate-spin"></div>
                    <span class="font-medium text-stone-600">Loading results...</span>
                </div>
            </div>
        </div>

        <!-- Added Barakallahu Feekum Section -->
        <div class="text-center mt-12 mb-8">
            <h3 class="text-5xl font-bold text-amber-900/80 font-breath tracking-wide">بارك الله فيكم</h3>
        </div>
        
        <footer class="mt-12 text-center text-stone-400 text-sm space-y-1">
            <div>© 2026 QHLS ചുങ്കം ശാഖ</div>
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 2; 
                this.speedY = Math.random() * 0.6 + 0.2;
                // Increased opacity for vivid animation
                this.color = `rgba(217, 119, 6, ${Math.random() * 0.4 + 0.2})`;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Increased particle count for higher visibility
        for (let i = 0; i < 120; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";
        const resultsGrid = document.querySelector("#resultsGrid");

        fetch(csvURL)
            .then(res => res.text())
            .then(data => {
                const rows = data.trim().split("\n");
                let results = rows.slice(1).map(row => {
                    const cols = row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim());
                    return {
                        name: cols[1],
                        wing: cols[2],
                        score: parseInt(cols[3]) || 0
                    };
                }).filter(item => item.name);

                results.sort((a, b) => b.score - a.score);

                let html = "";
                results.forEach((item, index) => {
                    html += `
                        <div class="bg-white/70 backdrop-blur p-5 rounded-2xl shadow-sm border border-stone-100 flex items-center gap-4 hover:shadow-md transition-shadow duration-300">
                            <div class="flex-shrink-0 w-12 h-12 bg-stone-100/80 rounded-full flex items-center justify-center text-stone-500 font-bold text-sm">
                                #${index + 1}
                            </div>
                            <div class="flex-grow min-w-0">
                                <h3 class="font-bold text-stone-900 text-lg truncate">${item.name}</h3>
                                <p class="text-sm text-stone-500">${item.wing}</p>
                            </div>
                            <div class="text-right whitespace-nowrap ml-3">
                                <span class="text-xs text-stone-400 uppercase tracking-widest block mb-1">Score</span>
                                <span class="text-2xl font-black text-amber-700">${item.score}</span>
                            </div>
                        </div>
                    `;
                });
                resultsGrid.innerHTML = html;
            })
            .catch(err => {
                resultsGrid.innerHTML = '<div class="bg-white/50 rounded-3xl p-8 text-center text-red-600 shadow-sm border border-stone-200">Failed to load data. Please check connection.</div>';
                console.error("Error fetching CSV:", err);
            });
    </script>
</body>
</html>
