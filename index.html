<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QHLS Weekly Quiz Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <header class="py-12 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            
            <h1 class="text-6xl md:text-7xl font-extrabold text-teal-900 tracking-tight mb-2">QHLS</h1>
            <h2 class="text-2xl md:text-3xl font-medium text-slate-600 mb-6">Weekly Quiz Results</h2>
            
            <div class="inline-flex items-center gap-3 px-6 py-3 bg-white border border-slate-200 shadow-sm rounded-2xl">
                <span class="text-xl">🎓</span>
                <span class="font-semibold text-slate-700">ക്ലാസ് - 2️⃣</span>
                <span class="text-slate-300">|</span>
                <span class="text-teal-700 font-bold">📖 സൂറത്തുല്‍ മുഅ്മിനൂന്‍</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-16">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto w-full">
                <table id="resultTable" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="px-6 py-5 font-bold text-slate-400 uppercase tracking-wider text-xs">Sl No</th>
                            <th class="px-6 py-5 font-bold text-slate-400 uppercase tracking-wider text-xs">Name</th>
                            <th class="px-6 py-5 font-bold text-slate-400 uppercase tracking-wider text-xs">Wing</th>
                            <th class="px-6 py-5 font-bold text-slate-400 uppercase tracking-wider text-xs text-right">Score</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="4" class="px-6 py-16 text-center text-slate-400">
                                <div class="flex flex-col items-center justify-center gap-3">
                                    <div class="w-8 h-8 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                                    <span class="font-medium text-slate-600">Loading live results...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-8 text-center text-slate-400 text-sm">
            © 2026 QHLS Academy
        </footer>
    </main>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";
        const tableBody = document.querySelector("#tableBody");

        fetch(csvURL)
            .then(res => res.text())
            .then(data => {
                const rows = data.trim().split("\n");
                let html = "";

                for (let i = 1; i < rows.length; i++) {
                    const rowText = rows[i].trim();
                    if (!rowText) continue;

                    const cols = rowText.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 4) continue;

                    const slNo = cols[0].replace(/"/g, '');
                    const name = cols[1].replace(/"/g, '');
                    const wing = cols[2].replace(/"/g, '');
                    const score = cols[3].replace(/"/g, '');

                    html += `
                        <tr class="hover:bg-slate-50 transition-colors duration-200">
                            <td class="px-6 py-4 text-slate-500 font-mono text-sm">${slNo}</td>
                            <td class="px-6 py-4 font-semibold text-slate-900">${name}</td>
                            <td class="px-6 py-4 text-slate-600">${wing}</td>
                            <td class="px-6 py-4 font-bold text-teal-600 text-right text-lg">${score}</td>
                        </tr>
                    `;
                }
                tableBody.innerHTML = html;
            })
            .catch(err => {
                tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-red-400">Failed to load data. Please try again later.</td></tr>';
                console.error("Error fetching CSV:", err);
            });
    </script>
</body>
</html>
