<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QHLS Weekly Quiz Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-5xl md:text-6xl font-extrabold text-teal-700 tracking-wider uppercase mb-2">QHLS</h1>
        <h1 class="text-2xl md:text-3xl font-semibold text-slate-800">🏆 Weekly Quiz Results</h1>
        <div class="mt-4 p-3 bg-teal-50 border border-teal-200 rounded-lg inline-block text-teal-800 font-semibold text-lg shadow-sm">
            ക്ലാസ് - 2️⃣ | 📖 സൂറത്തുല്‍ മുഅ്മിനൂന്‍
        </div>
    </div>

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
        <div class="overflow-x-auto">
            <table id="resultTable" class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-teal-600 text-white">
                        <th class="px-6 py-4 font-semibold uppercase tracking-wider">Sl No</th>
                        <th class="px-6 py-4 font-semibold uppercase tracking-wider">Name</th>
                        <th class="px-6 py-4 font-semibold uppercase tracking-wider">Wing</th>
                        <th class="px-6 py-4 font-semibold uppercase tracking-wider">Score</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <!-- Data will be injected here -->
                    <tr>
                        <td colspan="4" class="px-6 py-12 text-center text-teal-600 font-medium text-lg">
                            <div class="flex items-center justify-center gap-2">
                                <div class="w-4 h-4 bg-teal-600 rounded-full animate-bounce"></div>
                                <span>Loading results...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSX727T4ALUYfY-rKR4LdqvKWGZ-TuOiO_98FyaGjf_DirjYIi2awK4ymr_vRJ81U0HusrmG3E4kw73/pub?gid=685099871&single=true&output=csv";
        const tableBody = document.querySelector("#tableBody");

        fetch(csvURL)
            .then(res => res.text())
            .then(data => {
                const rows = data.trim().split("\n");
                let html = "";

                // Process rows starting from index 1 to skip header
                for (let i = 1; i < rows.length; i++) {
                    const rowText = rows[i].trim();
                    if (!rowText) continue;

                    // Improved regex to handle CSV fields
                    const cols = rowText.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
                    
                    if (!cols || cols.length < 4) continue;

                    html += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 text-slate-700 font-medium">${cols[0].replace(/"/g, '')}</td>
                            <td class="px-6 py-4 text-slate-900">${cols[1].replace(/"/g, '')}</td>
                            <td class="px-6 py-4 text-slate-600">${cols[2].replace(/"/g, '')}</td>
                            <td class="px-6 py-4 font-bold text-teal-700">${cols[3].replace(/"/g, '')}</td>
                        </tr>
                    `;
                }
                tableBody.innerHTML = html;
            })
            .catch(err => {
                tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Failed to load data. Please check the network connection.</td></tr>';
                console.error("Error fetching CSV:", err);
            });
    </script>
</body>
</html>
